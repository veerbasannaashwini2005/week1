<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Registration</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-light">

  <div class="container" style="max-width: 400px;">
    <div class="card shadow-sm">
      <div class="card-body">
        <h1 class="text-center text-primary mb-4">User Registration</h1>

        <!-- Error Message -->
        <div id="error" class="alert alert-danger d-none" role="alert">
          Please fill all fields correctly.
        </div>

        <!-- Registration Form -->
        <form id="form">
          <div class="mb-3">
            <input type="text" id="name" placeholder="Full Name" required
              class="form-control">
          </div>

          <div class="mb-3">
            <input type="email" id="email" placeholder="Email Address" required
              class="form-control">
          </div>

          <div class="mb-3">
            <input type="tel" id="phone" placeholder="Phone Number" pattern="[0-9]{10}" required
              class="form-control">
          </div>

          <button type="submit" class="btn btn-primary w-100">
            Register
          </button>
        </form>

        <!-- Success Message -->
        <div id="success" class="alert alert-success d-none mt-4" role="alert">
          <h5 class="alert-heading">Registration Successful!</h5>
          <p id="details" class="mb-2"></p>
          <button id="reset" class="btn btn-success btn-sm">
            New Registration
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const form = document.getElementById('form');
    const error = document.getElementById('error');
    const success = document.getElementById('success');
    const details = document.getElementById('details');
    const resetBtn = document.getElementById('reset');

    form.addEventListener('submit', e => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();

      if (!name || !email || !phone) {
        error.classList.remove('d-none');
        return;
      }

      error.classList.add('d-none');
      details.textContent = `Registered: ${name}, Email: ${email}, Phone: ${phone}`;
      form.classList.add('d-none');
      success.classList.remove('d-none');
    });

    resetBtn.addEventListener('click', () => {
      form.reset();
      success.classList.add('d-none');
      form.classList.remove('d-none');
    });
  </script>
</body>
</html>
